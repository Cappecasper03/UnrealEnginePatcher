name: "Godot Export"
on:
  workflow_dispatch:

jobs:
  export_application:
    runs-on: ubuntu-latest
    name: Export Application
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Export Application
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.6.2/mono/Godot_v4.6.2-stable_mono_linux_headless_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.6.2/mono/Godot_v4.6.2-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: true
