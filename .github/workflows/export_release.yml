name: "Export Release"
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    name: Export Release
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Export Binary
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_mono_export_templates.tpz
          relative_project_path: ./
          archive_output: true

      - name: Create Release
        uses: ncipollo/release-action@v1.18.0
        with:
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
